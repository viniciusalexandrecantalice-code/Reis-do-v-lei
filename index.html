<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Reis do Vôlei</title>
    <script src="https://www.haxball.com/headless" charset="utf-8"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; text-align: center; padding: 30px; margin: 0; }
        .box { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0px 6px 20px rgba(0,0,0,0.7); border: 1px solid #333; }
        h1 { color: #00FF00; margin-bottom: 5px; font-size: 28px; }
        p { color: #aaa; font-size: 14px; }
        .loading-box { display: none; margin-top: 25px; color: #00ff00; font-weight: bold; font-size: 18px; }
        #recaptcha-container { margin-top: 20px; display: inline-block; min-height: 80px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(20,255,20,.3); border-radius: 50%; border-top-color: #00ff00; animation: spin 1s ease-in-out infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="box">
        <h1>🏐 Reis do Vôlei | Painel de Controle</h1>
        <p>Hospedado no GitHub Pages</p>
        <hr style="border-color: #333; margin: 20px 0;">
        
        <div id="captcha-area">
            <p style="color: #ffcc00; font-weight: bold;">👇 RESOLVA O CAPTCHA PARA ENTRAR DIRETO NA SALA:</p>
            <div id="recaptcha-container"></div>
        </div>

        <!-- Mensagem de redirecionamento automático -->
        <div class="loading-box" id="loadingBox">
            <div class="spinner"></div>
            <span>SALA GERADA! Redirecionando você direto para o jogo...</span>
        </div>
    </div>

    <script>
    const room = HBInit({
        roomName: "🏐 Reis do Vôlei | 2v2 🏐",
        maxPlayers: 12,
        noPlayer: true,
        public: true,
        geo: { code: "BR", lat: -23.5505, lon: -46.6333 }
    });

    const ADMIN_KEY = "!77";
    const REWARD_COINS = 50;

    let gameState = {
        pickingPhase: false,
        pickerId: null,
        chosenId: null,
        touchCount: 0,
        lastTouchPlayer: null,
        lastTouchTeam: 0,
        isOvertime: false,
        is1v1Mode: false 
    };

    let afkPlayers = new Set();
    let serverDatabase = {};

    room.setDefaultStadium("Classic");
    room.setScoreLimit(0); 
    room.setTimeLimit(0);

    // ESSA FUNÇÃO FAZ O REDIRECIONAMENTO AUTOMÁTICO
    room.onRoomLink = function(link) {
        // Esconde a área do captcha e mostra o aviso de carregamento
        document.getElementById("captcha-area").style.display = "none";
        document.getElementById("loadingBox").style.display = "block";
        
        // Aguarda 1 segundo e joga você direto para dentro do servidor
        setTimeout(() => {
            window.location.href = link;
        }, 1000);
    };

    function getPlayerData(player) {
        let auth = player.auth;
        if (serverDatabase[auth]) return serverDatabase[auth];
        
        let newData = { name: player.name, coins: 0, wins: 0, role: "Membro", avatar: "" };
        serverDatabase[auth] = newData;
        return newData;
    }

    function savePlayerData(player, data) {
        serverDatabase[player.auth] = data;
    }

    room.onPlayerJoin = function(player) {
        let pData = getPlayerData(player);
        pData.name = player.name;
        savePlayerData(player, pData);

        room.sendAnnouncement("👋 Bem-vindo " + player.name + "! Seus dados foram carregados. Patente: [" + pData.role + "] | 🏆 Vitórias: " + pData.wins + " | 💰 Moedas: " + pData.coins, player.id, 0x00FF00);
        
        if (pData.avatar) room.setPlayerAvatar(player.id, pData.avatar);
        if (pData.role === "Owner") room.setPlayerAdmin(player.id, true);

        checkQueueAndStart();
    };

    room.onPlayerLeave = function(player) {
        afkPlayers.delete(player.id);
        checkQueueAndStart();
    };

    function checkQueueAndStart() {
        if (room.getScores() !== null || gameState.pickingPhase) return;

        let allActive = room.getPlayerList().filter(p => !afkPlayers.has(p.id));
        let totalActiveCount = allActive.length;

        let specs = allActive.filter(p => p.team === 0);
        let reds = allActive.filter(p => p.team === 1);
        let blues = allActive.filter(p => p.team === 2);

        if (totalActiveCount < 2) return;

        if (totalActiveCount <= 3) {
            gameState.is1v1Mode = true;
            gameState.pickingPhase = false;

            if (reds.length === 0 && blues.length === 0 && specs.length >= 2) {
                room.setPlayerTeam(specs[0].id, 1); 
                room.setPlayerTeam(specs[1].id, 2); 
                room.sendAnnouncement("🎮 Modo 1v1 Ativado! Apenas 2 TOQUES permitidos na bola.", null, 0x00FFFF, "bold");
                startCountdown();
            } 
            else if ((reds.length === 0 || blues.length === 0) && specs.length >= 1) {
                let targetTeam = reds.length === 0 ? 1 : 2;
                room.setPlayerTeam(specs[0].id, targetTeam);
                room.sendAnnouncement("🎮 Próximo ativo da fila puxado para o 1v1.", null, 0x00FFFF, "bold");
                startCountdown();
            }
        } else {
            gameState.is1v1Mode = false;

            if (reds.length === 0 && blues.length === 0 && specs.length >= 2) {
                setupDraft(specs[0], specs[1]);
            } 
            else if ((reds.length === 0 || blues.length === 0) && specs.length >= 1) {
                let captain = specs[0];
                room.sendAnnouncement("📢 Fila: " + captain.name + ", escolha sua dupla digitando o número ID dela no chat!", null, 0xFFFF00);
                
                let listStr = "Disponíveis na Fila: ";
                specs.forEach((p, index) => {
                    if (index > 0) listStr += "| [" + p.id + "] " + p.name + " ";
                });
                room.sendAnnouncement(listStr, null, 0x00FFFF);
                
                gameState.pickingPhase = true;
                gameState.pickerId = captain.id;
                
                let targetTeam = reds.length === 0 ? 1 : 2;
                room.setPlayerTeam(captain.id, targetTeam);
            }
        }
    }

    function setupDraft(p1, p2) {
        gameState.pickingPhase = true;
        gameState.pickerId = p1.id;
        room.setPlayerTeam(p1.id, 1);
        room.setPlayerTeam(p2.id, 2);

        room.sendAnnouncement("📢 [ESCOLHA 2v2] " + p1.name + " (Vermelho), escolha sua dupla digitando o ID dela no chat!", null, 0xFFFF00);
        listAvailableSpecs();
    }

    function listAvailableSpecs() {
        let specs = room.getPlayerList().filter(p => p.team === 0 && !afkPlayers.has(p.id));
        if (specs.length === 0) {
            room.sendAnnouncement("⚠️ Fila vazia para seleção. Iniciando partida.", null, 0xFF0000);
            gameState.pickingPhase = false;
            startCountdown();
            return;
        }
        let msg = "IDs Disponíveis: ";
        specs.forEach(p => { msg += "[" + p.id + "] " + p.name + "  "; });
        room.sendAnnouncement(msg, null, 0x00FFFF);
    }

    function startCountdown() {
        room.sendAnnouncement("⏳ Partida iniciando em 3...", null, 0xFFFF00);
        setTimeout(() => { room.sendAnnouncement("⏳ 2...", null, 0xFFFF00); }, 1000);
        setTimeout(() => { room.sendAnnouncement("⏳ 1...", null, 0xFFFF00); }, 2000);
        setTimeout(() => { 
            let modoTexto = gameState.is1v1Mode ? "🔥 JOGO INICIADO (1v1 - 2 TOQUES)!" : "🔥 JOGO INICIADO (2v2 - 3 TOQUES)!";
            room.sendAnnouncement(modoTexto, null, 0x00FF00, "bold");
            room.startGame();
            resetBallCycle();
        }, 3000);
    }

    function resetBallCycle() {
        gameState.touchCount = 0;
        gameState.lastTouchPlayer = null;
        gameState.lastTouchTeam = 0;
        room.setDiscProperties(0, { color: 0x00FF00 }); 
    }

    room.onPlayerBallTouch = function(player) {
        if (gameState.lastTouchTeam !== player.team) {
            gameState.touchCount = 1;
            gameState.lastTouchTeam = player.team;
            room.setDiscProperties(0, { color: 0x00FF00 }); 
        } else {
            gameState.touchCount++;
            
            if (gameState.is1v1Mode) {
                if (gameState.touchCount === 2) {
                    room.setDiscProperties(0, { color: 0xFFFF00 }); 
                } else if (gameState.touchCount > 2) {
                    room.setDiscProperties(0, { color: 0xFF0000 }); 
                    room.sendAnnouncement("❌ Falha técnica: " + player.name + " deu o 3º toque no 1v1!", null, 0xFF0000);
                    room.stopGame(); 
                }
            } else {
                if (gameState.touchCount === 2) {
                    room.setDiscProperties(0, { color: 0xFFFF00 }); 
                } else if (gameState.touchCount === 3) {
                    room.setDiscProperties(0, { color: 0xFF9900 }); 
                } else if (gameState.touchCount > 3) {
                    room.setDiscProperties(0, { color: 0xFF0000 }); 
                    room.sendAnnouncement("❌ Falha técnica: " + player.name + " deu o 4º toque no 2v2!", null, 0xFF0000);
                    room.stopGame(); 
                }
            }
        }
        gameState.lastTouchPlayer = player;
    };

    room.onPositionsReset = function() {
        resetBallCycle();
    };

    room.onTeamGoal = function(team) {
        resetBallCycle();
        let scores = room.getScores();
        if (!scores) return;

        let redScore = scores.red;
        let blueScore = scores.blue;

        room.sendAnnouncement("🏐 Ponto! Placar Atual: Vermelho " + redScore + " - Azul " + blueScore, null, 0xFFFF00);

        if (redScore >= 6 && blueScore >= 6) {
            gameState.isOvertime = true;
        }

        if (!gameState.isOvertime) {
            if (redScore === 7) { endGame(1); }
            else if (blueScore === 7) { endGame(2); }
        } else {
            if (redScore >= blueScore + 2) { endGame(1); }
            else if (blueScore >= redScore + 2) { endGame(2); }
        }
    };

    function endGame(winnerTeam) {
        room.stopGame();
        let loserTeam = winnerTeam === 1 ? 2 : 1;
        let players = room.getPlayerList();
        
        players.forEach(p => {
            if (p.team === winnerTeam) {
                let data = getPlayerData(p);
                data.wins += 1;
                data.coins += REWARD_COINS;
                savePlayerData(p, data);
                room.sendAnnouncement("🏆 " + p.name + " venceu! Vitórias: " + data.wins, p.id, 0x00FF00);
            }
            if (p.team === loserTeam) {
                room.setPlayerTeam(p.id, 0); 
            }
        });

        gameState.isOvertime = false;
        gameState.pickingPhase = false;
        
        setTimeout(() => { checkQueueAndStart(); }, 3000);
    }

    room.onPlayerChat = function(player, message) {
        let pData = getPlayerData(player);
        let msgTrim = message.trim();

        if (msgTrim === ADMIN_KEY) {
            pData.role = "Owner";
            savePlayerData(player, pData);
            room.setPlayerAdmin(player.id, true);
            room.sendAnnouncement("👑 [SISTEMA] " + player.name + " obteve o cargo de OWNER com sucesso!", null, 0xFF0000, "bold");
            return false;
        }

        if (msgTrim.toLowerCase() === "!afk") {
            if (afkPlayers.has(player.id)) {
                afkPlayers.delete(player.id);
                room.sendAnnouncement("🎮 [AFK] " + player.name + " voltou e está ATIVO para jogar!", null, 0x00FF00);
            } else {
                afkPlayers.add(player.id);
                room.setPlayerTeam(player.id, 0); 
                room.sendAnnouncement("💤 [AFK] " + player.name + " agora está AUSENTE e foi retirado da fila.", null, 0xFF9900);
                
                if (gameState.pickingPhase && gameState.pickerId === player.id) {
                    gameState.pickingPhase = false;
                    gameState.pickerId = null;
                    room.sendAnnouncement("⚠️ O capitão ficou AFK. Sorteando nova seleção...", null, 0xFF0000);
                }
            }
            checkQueueAndStart();
            return false;
        }

        if (gameState.pickingPhase && player.id === gameState.pickerId) {
            let targetId = parseInt(msgTrim);
            let targetPlayer = room.getPlayer(targetId);

            if (targetPlayer && targetPlayer.team === 0 && !afkPlayers.has(targetPlayer.id)) {
                let pickerTeam = player.team;
                room.setPlayerTeam(targetPlayer.id, pickerTeam);
                
                gameState.pickingPhase = false;
                gameState.pickerId = null;

                let activeSpecs = room.getPlayerList().filter(p => p.team === 0 && !afkPlayers.has(p.id));
                let reds = room.getPlayerList().filter(p => p.team === 1);
                let blues = room.getPlayerList().filter(p => p.team === 2);

                if (reds.length === 1 && blues.length === 1 && activeSpecs.length >= 1) {
                    let secondCaptain = blues[0];
                    gameState.pickingPhase = true;
                    gameState.pickerId = secondCaptain.id;
                    room.sendAnnouncement("🏐 Agora é a vez de " + secondCaptain.name + " (Azul) escolher sua dupla pelo ID!", null, 0xFFFF00);
                    listAvailableSpecs();
                } else {
                    startCountdown();
                }
                return false;
            }
        }

        if (message.startsWith("!")) {
            let args = message.split(" ");
            let cmd = args[0].toLowerCase();
            if (cmd === "!status") {
                let statusAFK = afkPlayers.has(player.id) ? " [AFK]" : "";
                room.sendAnnouncement("📊 Status de " + player.name + statusAFK + " | Patente: " + pData.role + " | Vitórias: " + pData.wins + " | Moedas: " + pData.coins, player.id, 0x00FF00);
                return false;
            }
        }

        let tag = pData.role === "Owner" ? "[👑 Owner]" : "[👤 Membro]";
        if (afkPlayers.has(player.id)) tag = "[💤 AFK] " + tag;
        
        let color = pData.role === "Owner" ? 0xFF5555 : 0xAAAAAA;
        room.sendAnnouncement(tag + " " + player.name + ": " + message, null, color);
        return false;
    };
    </script>
</body>
</html>
